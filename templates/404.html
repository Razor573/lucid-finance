{% extends 'base.html' %}

{% block title %}Page Not Found - LucidFinance{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card" style="text-align: center; max-width: 500px;">
        <div class="auth-header">
            <i class="bx bx-compass"
                style="font-size: 60px; color: var(--expense); filter: drop-shadow(0 0 12px var(--expense-glow));"></i>
            <h1 style="font-size: 72px; font-weight: 900; margin: 10px 0; color: var(--expense);">404</h1>
            <h2>Lost in Space</h2>
            <p style="margin-top: 10px; font-size: 14px;">The page you are looking for does not exist or has been moved
                to another coordinate.</p>
        </div>

        <a href="/" class="btn btn-primary" style="margin-top: 15px; padding: 12px 24px;">
            <i class="bx bx-left-arrow-alt"></i>
            Return to Dashboard
        </a>
    </div>
</div>
{% endblock %}
